<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>Document Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
 
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
 
<style>
:root{
  --primary:#0d47a1;
  --bg:#f5f7fb;
  --card:#ffffff;
  --shadow:0 10px 30px rgba(0,0,0,.08);
}
 
*{box-sizing:border-box;}
 
body{
  margin:0;
  font-family:'Prompt',sans-serif;
  background:var(--bg);
  color:#333;
}
 
.container{
  max-width:1100px;
  margin:auto;
  padding:50px 24px 80px;
}
 
.header{
  display:flex;
  align-items:center;
  gap:18px;
  margin-bottom:10px;
}
 
.logo{
  width:52px;
  height:52px;
  border-radius:12px;
  background:linear-gradient(135deg,#2962ff,#0d47a1);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:30px;
  box-shadow:0 8px 20px rgba(13,71,161,.35);
}
 
h1{
  margin:0;
  font-weight:600;
  color:var(--primary);
}
 
.subtitle{
  margin:8px 0 40px;
  line-height:1.6;
}
 
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:28px;
}
 
.card{
  background:var(--card);
  border-radius:20px;
  padding:28px 26px;
  box-shadow:var(--shadow);
  transition:.3s ease;
  border-left:6px solid transparent;
}
 
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 50px rgba(0,0,0,.15);
}
 
.card a{
  text-decoration:none;
  color:inherit;
}
 
.card h3{
  margin:0 0 10px;
  font-size:20px;
}
 
.card p{
  margin:0;
  color:#666;
  font-size:15px;
}
 
.it{border-color:#1e88e5;}
.whd{border-color:#43a047;}
.hr{border-color:#e53935;}
.ctrl{border-color:#2e7d32;}
 
.badge{
  display:inline-block;
  margin-bottom:12px;
  padding:6px 14px;
  font-size:13px;
  border-radius:20px;
  background:#eef2ff;
  color:var(--primary);
  font-weight:500;
}
 
footer{
  margin-top:70px;
  text-align:center;
  font-size:14px;
  color:#777;
}
</style>
</head>
 
<body>
 
<div class="container">
 
  <!-- Header -->
  <div class="header">
    <div class="logo">&#127970;</div>
    <div>
      <h1>Document Center</h1>
      <div class="subtitle">
        ศูนย์รวมเอกสาร<br>
        <strong>IT, WHD, HR</strong>
      </div>
    </div>
  </div>
 
  <!-- Cards -->
  <div class="grid">
 
    <div class="card it">
      <a href="it/index.html">
        <span class="badge">IT</span>
        <h3>&#128153; IT Docs</h3>
        <p>ไอที</p>
      </a>
    </div>
 
    <div class="card whd">
      <a href="whd/index.html">
        <span class="badge">WHD</span>
        <h3>&#128154; WHD Docs</h3>
        <p>คลังสินค้า</p>
      </a>
    </div>
 
    <div class="card hr">
      <a href="sds/index.html">
        <span class="badge">HR</span>
        <h3>&#128157; HR Docs</h3>
        <p>ฝ่ายบุคคล</p>
      </a>
    </div>
 
 
  </div>
 
  <!-- Footer -->
  <footer>
    IT - Information Technology<br>
 
  </footer>
 
</div>
</body>
</html>
