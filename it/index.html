<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>IT Docs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
  --primary:#0d47a1;
  --accent:#e53935;
}

body{
  font-family:'Prompt',sans-serif;
  background:linear-gradient(135deg,#eef3ff,#f9fbff);
  margin:0;
  padding:30px 18px;
}

.container{
  max-width:1200px;
  margin:auto;
}

header{
  text-align:center;
}

header h1{
  color:var(--primary);
}

.search-box input{
  width:90%;
  max-width:400px;
  padding:12px;
  border-radius:30px;
  border:1px solid #ccc;
}

/* TOP BAR */
.topbar{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  margin-top:25px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 8px 22px rgba(0,0,0,0.08);
}

.card:hover{
  transform:translateY(-6px);
}

.card a{
  text-decoration:none;
  display:flex;
  gap:14px;
  align-items:center;
  color:var(--primary);
  font-weight:500;
}

.icon{
  font-size:24px;
  color:var(--accent);
}

/* PAGINATION */
.pagination{
  display:flex;
  gap:6px;
}

.pagination button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#eee;
  cursor:pointer;
}

.pagination button.active{
  background:#5b4bff;
  color:#fff;
}

footer{
  text-align:center;
  margin-top:40px;
  color:#777;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>💻 IT Docs</h1>

<div class="search-box">
<input type="text" id="search" placeholder="ค้นหาไฟล์...">
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    Items per page:
    <select id="limit">
      <option value="10">10</option>
      <option value="20" selected>20</option>
      <option value="50">50</option>
    </select>
  </div>

  <div id="fileCount">กำลังโหลด...</div>

  <div id="pagination" class="pagination"></div>
</div>

</header>

<div class="grid" id="qpList"></div>

<footer>VGB/I - IT</footer>

</div>

<script>
const container = document.getElementById("qpList");
const countBox = document.getElementById("fileCount");
const paginationBox = document.getElementById("pagination");

let allFiles = [];
let filteredFiles = [];

let currentPage = 1;
let itemsPerPage = 20;

/* ICON */
function getIcon(name){
  name = name.toLowerCase();
  if(name.endsWith(".pdf")) return "fa-file-pdf";
  if(name.match(/\.(xls|xlsx)$/)) return "fa-file-excel";
  if(name.match(/\.(doc|docx)$/)) return "fa-file-word";
  if(name.match(/\.(ppt|pptx)$/)) return "fa-file-powerpoint";
  if(name.match(/\.(jpg|png|jpeg)$/)) return "fa-file-image";
  return "fa-file";
}

/* LOAD DATA */
fetch("../files.json")
.then(res => res.json())
.then(files => {

  allFiles = files
    .map(f => f.trim())
    .filter(f => f.toLowerCase().startsWith("it/"));

  filteredFiles = [...allFiles];

  render();
})
.catch(err => {
  console.error(err);
  countBox.innerText = "โหลดข้อมูลไม่สำเร็จ";
});

/* RENDER */
function render(){

  container.innerHTML = "";

  let start = (currentPage - 1) * itemsPerPage;
  let end = start + itemsPerPage;

  let pageItems = filteredFiles.slice(start, end);

  pageItems.forEach(path => {

    const fileURL =
      "https://jakkapan-it.github.io/docs/" +
      encodeURIComponent(path).replace(/%2F/g, "/");

    const name = path.split("/").pop();

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <a href="${fileURL}" targetn"></i>
        ${name.replace(/\.[^/.]+$/, "")}
      </a>
    `;

    container.appendChild(card);
  });

  updateCount();
  renderPagination();
}

/* COUNT TEXT */
function updateCount(){
  let total = filteredFiles.length;

  let start = total === 0 ? 0 : (currentPage - 1) * itemsPerPage + 1;
  let end = Math.min(currentPage * itemsPerPage, total);

  countBox.innerText = `Showing ${start} to ${end} of ${total} entries`;
}

/* PAGINATION */
function renderPagination(){

  let totalPages = Math.ceil(filteredFiles.length / itemsPerPage);
  paginationBox.innerHTML = "";

  if(totalPages <= 1) return;

  // PREV
  paginationBox.innerHTML += `
    <button onclick="changePage(${currentPage-1})">«</button>
  `;

  for(let i=1;i<=totalPages;i++){
    if(i > 5 && Math.abs(i - currentPage) > 2) continue;

    paginationBox.innerHTML += `
      <button class="${i===currentPage?'active':''}"
        onclick="changePage(${i})">${i}</button>
    `;
  }

  // NEXT
  paginationBox.innerHTML += `
    <button onclick="changePage(${currentPage+1})">»</button>
  `;
}

/* CHANGE PAGE */
function changePage(page){
  let totalPages = Math.ceil(filteredFiles.length / itemsPerPage);
  if(page < 1 || page > totalPages) return;

  currentPage = page;
  render();
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){

  const keyword = this.value.toLowerCase();

  filteredFiles = allFiles.filter(file =>
    file.toLowerCase().includes(keyword)
  );

  currentPage = 1;
  render();
});

/* LIMIT */
document.getElementById("limit").addEventListener("change", function(){
  itemsPerPage = parseInt(this.value);
  currentPage = 1;
  render();
});
</script>

</body>
</html>
